<body>

<div>
<h1 id="msg">MOSTRE QUE SABE AUTOMATIZAR COM ROBOTFRAMEWORK!</h1>
</div>
<div id="app">
    <h1>Agora coloque seu Nome, cargo e empresa,valide a inserção e depois apague e faça validação</h1>
    <form>
    <fieldset>
        <label for="nome">Nome</label>
        <input nome="nome" type="text" v-model="form.nome">

        <label for="cargo">Cago</label>
        <input nome="cargo" type="text" v-model="form.cargo">

        <label for="empresa">Empresa</label>
        <input nome="empresa" type="text" v-model="form.empresa">

        <input type="button" value="Cadastrar" @click="adicionarFornecedor">
    </fieldset>
    </form>
    <span>
        {{form.nome}} - {{form.cargo}} - {{form.empresa}}
    </span>
    <fieldset>

    <div>
        <table class="table">
            <thead>
              
            </thead>
            <tbody>
                <tr v-for=" fornecedor in fornecedores">
                    <td>{{fornecedor.nome}}</td>
                    <td>{{fornecedor.cargo}}</td>
                    <td>{{fornecedor.empresa}}</td>
                    <td>
                        <button class="danger" @click="apagarFornecedor(fornecedor)">Apagar</button>
                    </td>
                </tr>
            </tbody>

        </table>


    </div>
</fieldset>
</div>

<script>
    var app = new Vue({
        el: "#app",
        data: {
            form: {
               
            },

            fornecedores: [


            ]
        },

        methods: {
            limparformulario: function () {
                
            },
            adicionarFornecedor: function () {
                this.fornecedores.push(this.form)
                this.limparformulario()
            },
        
        apagarFornecedor: function(fornecedor){
            var posicao = this.fornecedores.indexOf(fornecedor)
            this.fornecedores.splice(posicao,1)

        }
        }

    })

</script>
